# Deploy config for Netlify (also works as-is on Cloudflare Pages / Vercel,
# which auto-detect Astro static output).
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Long-cache the hashed, immutable build assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
